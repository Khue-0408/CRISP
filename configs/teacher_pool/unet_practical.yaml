teachers:
  - enabled: true
    model:
      name: pranet
      in_channels: 3
      num_classes: 1
      pretrained: false
      channel: 32
    checkpoint: ${oc.env:CRISP_UNET_TEACHER_PRANET_CKPT,""}
    checkpoint_loading:
      strict: true
      state_dict_keys: [model_state_dict, state_dict, model]
      prefixes_to_strip: ["module.", "model."]

  - enabled: true
    model:
      name: polyp_pvt
      in_channels: 3
      num_classes: 1
      decoder_channels: 64
    checkpoint: ${oc.env:CRISP_UNET_TEACHER_POLYP_PVT_CKPT,""}
    checkpoint_loading:
      strict: true
      state_dict_keys: [model_state_dict, state_dict, model]
      prefixes_to_strip: ["module.", "model."]

  - enabled: ${oc.decode:${oc.env:CRISP_UNET_ENABLE_UACANET_TEACHER,false}}
    model:
      class_path: ${oc.env:CRISP_UNET_TEACHER_UACANET_CLASS,""}
    checkpoint: ${oc.env:CRISP_UNET_TEACHER_UACANET_CKPT,""}
    checkpoint_loading:
      strict: true
      state_dict_keys: [model_state_dict, state_dict, model]
      prefixes_to_strip: ["module.", "model."]
