name: kvasir_seg
root: ${oc.env:CRISP_DATA_ROOT,data}/Kvasir-SEG
image_dir: images
mask_dir: masks
image_size: 352
random_hflip: true
random_vflip: true
random_rotate_degrees: 15
random_scale_range: [0.75, 1.25]
color_jitter:
  brightness: 0.10
  contrast: 0.10
  saturation: 0.10
  hue: 0.02
random_gaussian_blur:
  probability: 0.10
  kernel_size: 3
  sigma: [0.1, 1.0]
normalize_mean: [0.485, 0.456, 0.406]
normalize_std: [0.229, 0.224, 0.225]
num_workers: 8
pin_memory: true
splits:
  train:
    split_file: splits/train.txt
  val:
    split_file: splits/val.txt
