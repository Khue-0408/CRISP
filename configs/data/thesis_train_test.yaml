name: thesis_train_test
mode: local_train_test
root: ${oc.env:CRISP_DATA_ROOT,.}
train_dir: TrainDataset
test_dir: TestDataset

image_dir: image
mask_dir: mask
train_image_dir: image
train_mask_dir: mask
train_image_dir_candidates: [image, images]
train_mask_dir_candidates: [mask, masks]
test_image_dir_candidates: [image, images]
test_mask_dir_candidates: [mask, masks]

image_size: 352
random_hflip: true
random_vflip: true
random_rotate_degrees: 15
random_scale_range: [0.75, 1.25]
color_jitter:
  brightness: 0.10
  contrast: 0.10
  saturation: 0.10
  hue: 0.02
random_gaussian_blur:
  probability: 0.10
  kernel_size: 3
  sigma: [0.1, 1.0]
normalize_mean: [0.485, 0.456, 0.406]
normalize_std: [0.229, 0.224, 0.225]
num_workers: 8
pin_memory: true
strict_pairing: true

local_split:
  val_fraction: ${oc.decode:${oc.env:CRISP_LOCAL_VAL_FRACTION,0.1}}
  cache_dir: ${oc.env:CRISP_LOCAL_SPLIT_CACHE_DIR,metadata/splits/thesis_train_test}
