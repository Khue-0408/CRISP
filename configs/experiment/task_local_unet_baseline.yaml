# @package _global_

defaults:
  - /model: unet
  - /data@source_data: local_train_test
  - /eval: metrics
  - _self_

experiment_name: task_local_unet_baseline
task: binary_polyp_segmentation
seed: 0

workspace:
  root: ${oc.env:CRISP_LOCAL_WORKSPACE_ROOT,.}
  auto_create: true

output_dir: checkpoints/students/unet/baseline/seed_${seed}
eval_output_dir: outputs/metrics/${experiment_name}/seed_${seed}
posthoc_output_dir: outputs/posthoc/${experiment_name}/seed_${seed}
eval_datasets: []

student_init:
  checkpoint: ${oc.env:CRISP_LOCAL_UNET_BASELINE_INIT_CKPT,""}
  strict: true
  state_dict_keys: [model_state_dict, state_dict, model]
  prefixes_to_strip: ["module.", "model."]
  download:
    enabled: ${oc.decode:${oc.env:CRISP_AUTO_DOWNLOAD_WEIGHTS,false}}
    url: ${oc.env:CRISP_LOCAL_UNET_BASELINE_INIT_URL,""}

training:
  epochs: 100
  batch_size: 16
  require_validation: true
  optimizer: adamw
  lr_student: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  mixed_precision: true
  gradient_clip_norm: 1.0

method:
  name: baseline
  use_crisp: false
  use_projector: false
  use_teachers: false

eval:
  auto_discover_local_test_datasets: true
