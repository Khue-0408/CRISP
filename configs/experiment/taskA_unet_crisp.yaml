# @package _global_

defaults:
  - /model: unet
  - /crisp: default
  - /teacher_pool: thesis_default
  - /data@source_data: kvasir_seg
  - /data@eval_data.kvasir: kvasir_test
  - /data@eval_data.cvc_clinicdb: cvc_clinicdb
  - /data@eval_data.cvc_300: cvc_300
  - /data@eval_data.colondb: colondb
  - /data@eval_data.etis: etis
  - /data@eval_data.polypgen: polypgen
  - /eval: metrics
  - _self_

experiment_name: taskA_unet_crisp
task: binary_polyp_segmentation
seed: 0
output_dir: outputs/checkpoints/${experiment_name}/seed_${seed}
eval_output_dir: outputs/metrics/${experiment_name}/seed_${seed}
posthoc_output_dir: outputs/posthoc/${experiment_name}/seed_${seed}
eval_datasets: [kvasir, cvc_clinicdb, cvc_300, colondb, etis]

student_init:
  checkpoint: ${oc.env:CRISP_UNET_CRISP_INIT_CKPT,""}
  strict: true
  state_dict_keys: [model_state_dict, state_dict, model]
  prefixes_to_strip: ["module.", "model."]

training:
  epochs: 120
  batch_size: 16
  require_validation: true
  optimizer: adamw
  lr_student: 1.0e-4
  lr_projector: 2.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  mixed_precision: true
  gradient_clip_norm: 1.0

method:
  name: crisp
  use_crisp: true
  use_projector: true
  use_teachers: true
  target_mode: boundary_posterior
  use_boundary_weighted_task: true
  use_identity_regularization: true
  use_amortization_loss: true
  allow_self_ensemble_teacher: false
